<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Padel Training App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="content">

  <!-- Sticky logo with Install button -->
  <div class="logo-container">
    <div class="logo-banner">
      <img src="https://raw.githubusercontent.com/padelstijn/padel-app/main/padelpodcastlogo360v2.jpeg"
           alt="Padel Podcast Logo"
           onclick="window.open('https://sites.google.com/view/padelpodcast/reports','_blank')">
    </div>
    <button id="installBtn" onclick="installApp()">📲 Install App</button>
  </div>

  <button id="randomFactBtn" onclick="randomRow()">🎲 RANDOM</button>

  <h3>🎾 Padel Training</h3>

  <div id="rowNumber"></div>
  <div id="rowContent"></div>

</div>

<div class="bottom">
  <button onclick="prevRow()">⬅</button>
  <button onclick="nextRow()">➡</button>
  <button onclick="addFav()">⭐</button>
  <button onclick="openGoogle()">G</button>
  <button onclick="openYT()">YT</button>
</div>

<!-- JavaScript -->
<script src="script.js"></script>
</body>
</html>
